<div class="relative min-h-screen flex items-center justify-center bg-gray-50 overflow-hidden py-12">
  <!-- Fond décoratif (Background circles/mesh) -->
  <div class="absolute inset-0 z-0 pointer-events-none">
    <div
      class="absolute -top-24 -left-24 w-96 h-96 bg-violet-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-pulse">
    </div>
    <div
      class="absolute -bottom-24 -right-24 w-96 h-96 bg-fuchsia-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-pulse"
      style="animation-delay: 2s;"></div>
    <div
      class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-teal-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30">
    </div>
  </div>

  <!-- Carte de connexion -->
  <div
    class="relative z-10 w-full max-w-md bg-white rounded-3xl shadow-2xl shadow-gray-200/60 p-8 sm:p-10 mx-4 border border-gray-100">

    <!-- Logo / Icon Placeholder -->
    <div class="flex justify-center mb-8">
      <div
        class="w-16 h-16 bg-gradient-to-tr from-violet-600 to-fuchsia-600 rounded-2xl flex items-center justify-center shadow-lg transform -rotate-6 transition-transform hover:rotate-0 duration-300">
        <svg class="w-8 h-8 text-white transform rotate-6 hover:rotate-0 transition-transform duration-300" fill="none"
          stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
          </path>
        </svg>
      </div>
    </div>

    <!-- En-tête -->
    <div class="text-center mb-8">
      <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-2">Welcome Back</h2>
      <p class="text-sm text-gray-500 font-medium">Sign in to your account</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="error" class="mb-6 rounded-xl bg-red-50 p-4 border border-red-100 flex items-start">
      <svg class="h-5 w-5 text-red-500 mt-0.5 mr-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <p class="text-sm text-red-700 font-medium">{{ error }}</p>
    </div>

    <!-- Formulaire -->
    <form class="space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
            </svg>
          </div>
          <input id="email" formControlName="email" type="email" autocomplete="email" required
            class="block w-full pl-11 pr-4 py-3 border border-gray-300 rounded-xl bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent focus:bg-white transition-all duration-200 ease-in-out sm:text-sm"
            placeholder="you@example.com">
        </div>
      </div>

      <!-- Password -->
      <div>
        <div class="flex items-center justify-between mb-2">
          <label for="password" class="block text-sm font-semibold text-gray-700">Password</label>
        </div>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </div>
          <input id="password" formControlName="password" type="password" autocomplete="current-password" required
            class="block w-full pl-11 pr-4 py-3 border border-gray-300 rounded-xl bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent focus:bg-white transition-all duration-200 ease-in-out sm:text-sm"
            placeholder="••••••••">
        </div>
      </div>

      <!-- Bouton Submit -->
      <button type="submit" [disabled]="loginForm.invalid"
        class="w-full flex justify-center items-center gap-2 py-3.5 px-4 mt-2 border border-transparent rounded-xl shadow-lg shadow-violet-500/30 text-sm font-bold text-white bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-500 hover:to-fuchsia-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-violet-500 transform transition-all duration-200 hover:-translate-y-0.5 hover:shadow-xl hover:shadow-violet-500/40 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 disabled:hover:shadow-violet-500/30">
        Sign In
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
        </svg>
      </button>
    </form>

    <!-- Footer / Sign up text -->
    <div
      class="mt-8 text-center bg-gray-50/80 -mx-8 sm:-mx-10 -mb-8 sm:-mb-10 p-6 rounded-b-3xl border-t border-gray-100">
      <p class="text-sm text-gray-500 font-medium">
        Don't have an account?
        <a routerLink="/register"
          class="font-bold text-violet-600 hover:text-violet-500 hover:underline transition-colors">
          Sign up
        </a>
      </p>
    </div>
  </div>
</div>
