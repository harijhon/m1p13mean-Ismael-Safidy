<div class="card p-8 bg-surface-0 rounded-3xl shadow-xl space-y-8">
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-3xl font-bold tracking-tight text-surface-900 mb-1">Carte des Box</h1>
            <p class="text-surface-500">Vue d'ensemble des 100 emplacements du centre commercial</p>
        </div>

        <!-- Legend -->
        <div class="flex gap-4 p-4 bg-surface-50 rounded-2xl border border-surface-200">
            <div class="flex items-center gap-2">
                <div class="w-4 h-4 rounded-full bg-emerald-500"></div>
                <span class="text-sm font-medium text-surface-700">Libre</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-4 h-4 rounded-full bg-blue-500"></div>
                <span class="text-sm font-medium text-surface-700">Occupé</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-4 h-4 rounded-full bg-orange-500"></div>
                <span class="text-sm font-medium text-surface-700">En Pré-avis</span>
            </div>
        </div>
    </div>

    <!-- Floors Grid -->
    <div class="space-y-12">
        <div *ngFor="let floorData of grid()" class="space-y-4">

            <div class="flex items-center gap-4">
                <h2 class="text-xl font-semibold text-surface-800">Étage {{ floorData.floor }}</h2>
                <div class="flex-1 h-px bg-surface-200"></div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-5 lg:grid-cols-10 gap-3">
                <div *ngFor="let box of floorData.boxes" [ngClass]="getStatusColor(box.status)"
                    class="group relative flex flex-col items-center justify-center p-3 h-24 rounded-2xl border-2 transition-all duration-200 cursor-pointer hover:shadow-md hover:-translate-y-1">

                    <span class="text-lg font-bold opacity-80">{{ box.boxNumber }}</span>

                    <!-- Store info if occupied -->
                    <div *ngIf="box.store" class="mt-2 text-xs font-semibold text-center truncate w-full px-1">
                        {{ box.store.name }}
                    </div>

                    <!-- Tooltip Data -->
                    <div
                        class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-max max-w-[200px] px-3 py-2 bg-surface-900 text-white text-xs font-medium rounded-xl shadow-xl opacity-0 translate-y-2 pointer-events-none group-hover:opacity-100 group-hover:translate-y-0 transition-all duration-200 z-50 text-center flex flex-col items-center gap-1">
                        <span class="text-[10px] uppercase tracking-wider text-surface-400">{{ box.status }}</span>
                        <ng-container *ngIf="box.store">
                            <span class="font-bold border-b border-surface-700 pb-1 w-full">{{ box.store.name }}</span>
                            <span class="text-surface-300">Gérant: {{ box.store.owner?.name }}</span>
                            <span *ngIf="box.status === 'PRE_AVIS'" class="text-orange-400 font-bold mt-1 block">Départ
                                prévu</span>
                        </ng-container>
                        <ng-container *ngIf="!box.store">
                            <span class="text-emerald-400">Prêt à être loué</span>
                        </ng-container>
                        <!-- Tooltip Arrow -->
                        <div
                            class="absolute top-full left-1/2 -translate-x-1/2 w-0 h-0 border-l-4 border-r-4 border-t-4 border-transparent border-t-surface-900">
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
