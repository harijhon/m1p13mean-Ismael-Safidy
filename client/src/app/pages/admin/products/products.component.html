<p-toast></p-toast>

<p-toolbar styleClass="mb-4">
  <div class="flex flex-wrap items-center justify-between gap-4" pToolbarLeft>
    <div class="flex gap-2">
      <button pButton label="Nouveau" icon="pi pi-plus" class="p-button-success mr-2" (click)="openNew()"></button>
      <button pButton label="Supprimer" icon="pi pi-trash" class="p-button-outlined p-button-secondary" 
              [disabled]="!selectedProducts || !selectedProducts.length" (click)="deleteSelectedProducts()"></button>
    </div>
  </div>
  <div class="flex gap-2" pToolbarRight>
    <button pButton label="Export" icon="pi pi-upload" class="p-button-secondary"></button>
  </div>
</p-toolbar>

<p-table #dt [value]="products" [loading]="isLoading" responsiveLayout="scroll" [rows]="10" [paginator]="true" 
         [globalFilterFields]="['name','type']" selectionMode="multiple" [(selection)]="selectedProducts" 
         styleClass="p-datatable-gridlines">
  <ng-template pTemplate="caption">
    <div class="flex items-center justify-between">
      <h5 class="m-0">Gestion des Produits</h5>
      <p-iconfield class="p-iconfield p-iconfield-left">
        <p-inputicon styleClass="pi pi-search" />
        <input pInputText placeholder="Rechercher..." class="p-component p-inputtext" 
               (input)="onGlobalFilter(dt, $event)" />
      </p-iconfield>
    </div>
  </ng-template>
  
  <ng-template pTemplate="header">
    <tr>
      <th style="width: 4rem">
        <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
      </th>
      <th>Image</th>
      <th>Nom</th>
      <th>Prix</th>
      <th>Stock</th>
      <th>Type</th>
      <th>Statut</th>
      <th>Actions</th>
    </tr>
  </ng-template>
  
  <ng-template pTemplate="body" let-product>
    <tr>
      <td>
        <p-tableCheckbox [value]="product"></p-tableCheckbox>
      </td>
      <td>
        <img [src]="product.images && product.images[0] ? product.images[0] : 'https://primefaces.org/cdn/primeng/images/demo/product-placeholder.svg'" 
             class="shadow-lg" alt="{{ product.name }}" width="50" />
      </td>
      <td>{{ product.name }}</td>
      <td>{{ product.price | currency:'USD':'symbol':'1.0-0' }}</td>
      <td>
        <p-tag [value]="product.currentStock" [severity]="getStockSeverity(product.currentStock)"></p-tag>
      </td>
      <td>{{ product.type }}</td>
      <td>
        <p-tag [value]="product.isActive ? 'Actif' : 'Inactif'" [severity]="getStatusSeverity(product.isActive)"></p-tag>
      </td>
      <td>
        <div class="flex gap-2">
          <button pButton pRipple icon="pi pi-pencil" class="p-button-rounded p-button-outlined p-button-success mr-2" 
                  (click)="editProduct(product)"></button>
          <button pButton pRipple icon="pi pi-trash" class="p-button-rounded p-button-outlined p-button-danger" 
                  (click)="deleteProduct(product)"></button>
        </div>
      </td>
    </tr>
  </ng-template>
  
  <ng-template pTemplate="loadingbody" let-rowIndex>
    <tr>
      <td><p-skeleton size="2rem" shape="circle"></p-skeleton></td>
      <td><p-skeleton size="50px" height="50px"></p-skeleton></td>
      <td><p-skeleton height="2rem"></p-skeleton></td>
      <td><p-skeleton height="2rem"></p-skeleton></td>
      <td><p-skeleton height="2rem"></p-skeleton></td>
      <td><p-skeleton height="2rem"></p-skeleton></td>
      <td><p-skeleton height="2rem"></p-skeleton></td>
      <td class="text-center"><p-skeleton size="2rem" shape="circle"></p-skeleton></td>
    </tr>
  </ng-template>
</p-table>

<!-- Product Dialog -->
<p-dialog [(visible)]="productDialog" [style]="{width: '800px'}" header="Détails Produit" [modal]="true" 
          class="p-fluid" [closable]="false">
  <ng-template pTemplate="content">
    <form [formGroup]="productForm" (ngSubmit)="saveProduct()">
      <div class="field">
        <label for="name" class="block font-bold mb-3">Nom</label>
        <input pInputText id="name" type="text" formControlName="name" class="p-inputtext-fluid" 
               [ngClass]="{'ng-invalid': submitted && productForm.get('name')?.invalid}" />
        <small *ngIf="submitted && productForm.get('name')?.invalid" class="p-error">Le nom est requis.</small>
      </div>
      
      <div class="field">
        <label for="image" class="block font-bold mb-3">Image</label>
        <p-fileUpload #fileUpload id="image" [auto]="true" [maxFileSize]="1000000" 
                      (onUpload)="onUpload($event)" [showUploadButton]="false" 
                      [showCancelButton]="false" [chooseLabel]="'Choisir une image'">
        </p-fileUpload>
      </div>
      
      <div class="field">
        <label for="type" class="block font-bold mb-3">Type</label>
        <p-select id="type" [options]="[{label: 'Produit', value: 'PRODUCT'}, {label: 'Service', value: 'SERVICE'}]" 
                  optionLabel="label" optionValue="value" formControlName="type" 
                  placeholder="Sélectionnez un type" class="p-inputtext-fluid">
        </p-select>
      </div>
      
      <div class="field">
        <label for="hasVariants" class="block font-bold mb-3">Ce produit a des variantes ?</label>
        <p-toggleSwitch id="hasVariants" formControlName="hasVariants"></p-toggleSwitch>
      </div>
      
      <div *ngIf="!productForm.get('hasVariants')?.value">
        <div class="field">
          <label for="price" class="block font-bold mb-3">Prix</label>
          <p-inputNumber id="price" formControlName="price" mode="currency" currency="USD" locale="en-US" 
                         class="p-inputtext-fluid" [ngClass]="{'ng-invalid': submitted && productForm.get('price')?.invalid}"></p-inputNumber>
        </div>
        
        <div class="field">
          <label for="costPrice" class="block font-bold mb-3">Prix de Revient</label>
          <p-inputNumber id="costPrice" formControlName="costPrice" mode="currency" currency="USD" locale="en-US" 
                         class="p-inputtext-fluid" [ngClass]="{'ng-invalid': submitted && productForm.get('costPrice')?.invalid}"></p-inputNumber>
        </div>
        
        <div class="field">
          <label for="currentStock" class="block font-bold mb-3">Stock Actuel</label>
          <p-inputNumber id="currentStock" formControlName="currentStock" class="p-inputtext-fluid" 
                         [ngClass]="{'ng-invalid': submitted && productForm.get('currentStock')?.invalid}"></p-inputNumber>
        </div>
      </div>
      
      <div *ngIf="productForm.get('hasVariants')?.value">
        <div class="field">
          <div class="flex justify-content-between align-items-center">
            <label class="block font-bold mb-3">Variantes</label>
            <button pButton type="button" label="Ajouter Variante" icon="pi pi-plus" 
                    class="p-button-success" (click)="addVariant()"></button>
          </div>
          
          <div *ngIf="variants.length > 0" class="mt-3">
            <p-table [value]="variants.controls" [tableStyle]="{ 'min-width': '500px' }">
              <ng-template pTemplate="header">
                <tr>
                  <th>SKU</th>
                  <th>Attributs</th>
                  <th>Prix</th>
                  <th>Stock</th>
                  <th>Action</th>
                </tr>
              </ng-template>
              <ng-template pTemplate="body" let-variantGroup let-i="rowIndex">
                <tr [formGroupName]="i">
                  <td>
                    <input pInputText formControlName="sku" placeholder="SKU" class="p-inputtext w-full" />
                  </td>
                  <td>
                    <div class="flex gap-2">
                      <input pInputText formControlName="couleur" placeholder="Couleur" class="p-inputtext w-full" />
                      <input pInputText formControlName="taille" placeholder="Taille" class="p-inputtext w-full" />
                    </div>
                  </td>
                  <td>
                    <p-inputNumber formControlName="price" mode="currency" currency="USD" locale="en-US" 
                                   class="w-full"></p-inputNumber>
                  </td>
                  <td>
                    <p-inputNumber formControlName="stock" class="w-full"></p-inputNumber>
                  </td>
                  <td>
                    <button pButton type="button" icon="pi pi-trash" class="p-button-danger p-button-sm" 
                            (click)="removeVariant(i)"></button>
                  </td>
                </tr>
              </ng-template>
            </p-table>
          </div>
        </div>
      </div>
      
      <div class="field">
        <label for="isActive" class="block font-bold mb-3">Actif</label>
        <p-toggleSwitch id="isActive" formControlName="isActive"></p-toggleSwitch>
      </div>
    </form>
  </ng-template>
  
  <ng-template pTemplate="footer">
    <button pButton pRipple label="Annuler" icon="pi pi-times" class="p-button-text" (click)="hideDialog()"></button>
    <button pButton pRipple label="Sauvegarder" icon="pi pi-check" class="p-button-text" (click)="saveProduct()" 
            [disabled]="productForm.invalid && submitted"></button>
  </ng-template>
</p-dialog>

<!-- Delete Confirmation Dialog -->
<p-confirmDialog [style]="{width: '450px'}" [closable]="false" rejectButtonStyleClass="p-button-text"></p-confirmDialog>
