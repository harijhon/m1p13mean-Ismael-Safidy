<div class="fixed top-5 right-5 w-full max-w-sm transition-all duration-500 ease-out transform" [ngClass]="{
    'translate-y-0 opacity-100 scale-100 z-[9999]': toastService.toastState().isVisible,
    '-translate-y-8 opacity-0 scale-95 pointer-events-none -z-10': !toastService.toastState().isVisible
  }">
    <div
        class="bg-white shadow-2xl rounded-xl border-l-4 border-teal-500 p-4 flex items-center justify-between pointer-events-auto">

        <div class="flex items-center gap-4 overflow-hidden">
            <!-- Checked Icon + Product Image Container -->
            <div class="relative flex-shrink-0">
                <img [src]="toastService.toastState().productImage" alt="Product added"
                    class="w-12 h-12 rounded-lg object-cover border border-gray-100 bg-gray-50">
                <!-- Small Check Badge overlay -->
                <div
                    class="absolute -bottom-1 -right-1 bg-green-500 rounded-full w-5 h-5 flex items-center justify-center border-2 border-white shadow-sm">
                    <i class="pi pi-check text-white text-[10px] font-bold"></i>
                </div>
            </div>

            <!-- Text Content -->
            <div class="flex-1 min-w-0">
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-0.5">Ajouté au panier</p>
                <p class="text-sm font-bold text-gray-900 truncate">{{ toastService.toastState().productName }}</p>
            </div>
        </div>

        <!-- Action Link -->
        <div class="ml-4 flex-shrink-0 border-l border-gray-100 pl-4 py-1">
            <a routerLink="/store/cart"
                class="text-sm font-bold text-teal-600 hover:text-teal-700 transition-colors whitespace-nowrap cursor-pointer">
                Voir le panier
            </a>
        </div>

        <!-- Optional Close Button (Invisible but accessible for immediate dismissal) -->
        <button (click)="toastService.hideToast()"
            class="absolute top-1 right-1 p-1 text-gray-300 hover:text-gray-500 cursor-pointer">
            <i class="pi pi-times text-xs"></i>
        </button>
    </div>
</div>
